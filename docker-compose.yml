services:
  db:
    image: pgvector/pgvector:pg16
    container_name: projectouvidoria_db
    environment:
      POSTGRES_DB: ${DB_NAME:-projectouvidoria}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectouvidoria_network

  redis:
    image: redis:7-alpine
    container_name: projectouvidoria_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projectouvidoria_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectouvidoria_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-projectouvidoria}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - projectouvidoria_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectouvidoria_frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - projectouvidoria_network

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:

networks:
  projectouvidoria_network:
    driver: bridge
